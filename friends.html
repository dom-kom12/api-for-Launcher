<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Znajomi - Nebula</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Nawigacja */
        .nav {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .nav-links a:hover {
            opacity: 1;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 30px;
        }

        @media (max-width: 900px) {
            .main-layout {
                grid-template-columns: 1fr;
            }
        }

        /* Cards */
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 25px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            margin-bottom: 20px;
        }

        .card-title {
            font-size: 20px;
            margin-bottom: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        /* Add Friend */
        .add-friend-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .input {
            flex: 1;
            padding: 12px 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 14px;
        }

        .input:focus {
            outline: none;
            border-color: #00d4ff;
        }

        .btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: #fff;
            border: none;
            padding: 12px 25px;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-success {
            background: linear-gradient(135deg, #00b894 0%, #00cec9 100%);
        }

        .btn-danger {
            background: linear-gradient(135deg, #d63031 0%, #e17055 100%);
        }

        /* Friends List */
        .friends-list {
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .friend-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: rgba(0, 0, 0, 0.2);
            border-radius: 12px;
            transition: all 0.3s;
        }

        .friend-item:hover {
            background: rgba(0, 0, 0, 0.3);
            transform: translateX(5px);
        }

        .friend-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .friend-avatar {
            width: 45px;
            height: 45px;
            border-radius: 50%;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: bold;
        }

        .friend-details h4 {
            margin-bottom: 3px;
        }

        .friend-status {
            font-size: 12px;
            opacity: 0.7;
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #00ff88;
        }

        .status-dot.offline {
            background: #636e72;
        }

        .friend-actions {
            display: flex;
            gap: 8px;
        }

        .icon-btn {
            width: 35px;
            height: 35px;
            border-radius: 8px;
            border: none;
            background: rgba(255, 255, 255, 0.1);
            color: #fff;
            cursor: pointer;
            transition: all 0.3s;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .icon-btn:hover {
            background: rgba(255, 255, 255, 0.2);
            transform: scale(1.1);
        }

        /* Pending Invites */
        .invite-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 15px;
            background: rgba(0, 212, 255, 0.1);
            border-radius: 12px;
            margin-bottom: 10px;
            border: 1px solid rgba(0, 212, 255, 0.2);
        }

        .invite-actions {
            display: flex;
            gap: 8px;
        }

        .btn-small {
            padding: 8px 15px;
            font-size: 12px;
            border-radius: 6px;
        }

        /* Chat Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .chat-modal {
            width: 90%;
            max-width: 600px;
            height: 80vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            border-radius: 20px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
        }

        .chat-header {
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chat-messages {
            flex: 1;
            overflow-y: auto;
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .message {
            max-width: 70%;
            padding: 12px 16px;
            border-radius: 15px;
            word-wrap: break-word;
        }

        .message.sent {
            align-self: flex-end;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border-bottom-right-radius: 5px;
        }

        .message.received {
            align-self: flex-start;
            background: rgba(255, 255, 255, 0.1);
            border-bottom-left-radius: 5px;
        }

        .message-time {
            font-size: 11px;
            opacity: 0.7;
            margin-top: 5px;
        }

        .chat-input-area {
            padding: 20px;
            background: rgba(0, 0, 0, 0.3);
            display: flex;
            gap: 10px;
        }

        .chat-input {
            flex: 1;
            padding: 12px;
            background: rgba(255, 255, 255, 0.1);
            border: none;
            border-radius: 10px;
            color: #fff;
        }

        .close-btn {
            background: none;
            border: none;
            color: #fff;
            font-size: 24px;
            cursor: pointer;
            opacity: 0.7;
            transition: opacity 0.3s;
        }

        .close-btn:hover {
            opacity: 1;
        }

        .empty-state {
            text-align: center;
            padding: 40px;
            opacity: 0.6;
        }

        .badge {
            background: #ff4444;
            color: #fff;
            font-size: 11px;
            padding: 2px 8px;
            border-radius: 10px;
            margin-left: 5px;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #00d4ff;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-content">
            <div class="logo" onclick="window.location.href='/'">NEBULA</div>
            <div class="nav-links">
                <a href="/">Gry</a>
                <a href="/library.html">Biblioteka</a>
                <a href="/friends.html">Znajomi</a>
                <div class="user-info">
                    <span id="usernameDisplay"></span>
                    <button class="logout-btn" onclick="logout()">Wyloguj</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <div class="main-layout">
            <!-- Left Column -->
            <div>
                <div class="card">
                    <h2 class="card-title">👥 Twoi znajomi</h2>
                    <div class="add-friend-form">
                        <input type="text" class="input" id="friendUsername" placeholder="Nazwa użytkownika...">
                        <button class="btn" onclick="addFriend()">Dodaj znajomego</button>
                    </div>
                    <div id="friendsList" class="friends-list">
                        <div class="loading">
                            <div class="spinner"></div>
                            Ładowanie...
                        </div>
                    </div>
                </div>
            </div>

            <!-- Right Column -->
            <div>
                <div class="card">
                    <h2 class="card-title">
                        📨 Zaproszenia
                        <span id="inviteCount" class="badge" style="display:none">0</span>
                    </h2>
                    <div id="pendingInvites">
                        <div class="empty-state">Brak oczekujących zaproszeń</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Chat Modal -->
    <div class="modal-overlay" id="chatModal">
        <div class="chat-modal">
            <div class="chat-header">
                <h3 id="chatTitle">Czat</h3>
                <button class="close-btn" onclick="closeChat()">&times;</button>
            </div>
            <div class="chat-messages" id="chatMessages"></div>
            <div class="chat-input-area">
                <input type="text" class="chat-input" id="chatInput" placeholder="Napisz wiadomość..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button class="btn" onclick="sendMessage()">Wyślij</button>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '';
        let currentUser = null;
        let currentChatFriend = null;
        let chatRefreshInterval = null;

        // Auth check
        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        
        if (!token || !username) {
            window.location.href = '/login.html';
        } else {
            currentUser = { username, token };
            document.getElementById('usernameDisplay').textContent = username;
            loadFriends();
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            window.location.href = '/login.html';
        }

        async function loadFriends() {
            try {
                const response = await fetch(`${API_URL}/api/friends/${username}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to load');

                const data = await response.json();
                
                // Render friends
                const friendsList = document.getElementById('friendsList');
                if (data.friends.length === 0) {
                    friendsList.innerHTML = '<div class="empty-state">Nie masz jeszcze znajomych. Dodaj kogoś!</div>';
                } else {
                    friendsList.innerHTML = data.friends.map(f => `
                        <div class="friend-item">
                            <div class="friend-info">
                                <div class="friend-avatar">${f.username[0].toUpperCase()}</div>
                                <div class="friend-details">
                                    <h4>${f.username}</h4>
                                    <div class="friend-status">
                                        <span class="status-dot ${f.status === 'online' ? '' : 'offline'}"></span>
                                        ${f.status === 'online' ? 'Online' : 'Offline'}
                                    </div>
                                </div>
                            </div>
                            <div class="friend-actions">
                                <button class="icon-btn" onclick="openChat('${f.username}')" title="Czat">💬</button>
                                <button class="icon-btn" onclick="removeFriend('${f.username}')" title="Usuń" style="color:#ff4444">✕</button>
                            </div>
                        </div>
                    `).join('');
                }

                // Render pending invites
                const pendingDiv = document.getElementById('pendingInvites');
                const inviteCount = document.getElementById('inviteCount');
                
                if (data.pendingInvites && data.pendingInvites.length > 0) {
                    inviteCount.textContent = data.pendingInvites.length;
                    inviteCount.style.display = 'inline';
                    
                    pendingDiv.innerHTML = data.pendingInvites.map(inv => `
                        <div class="invite-item">
                            <div>
                                <strong>${inv.from}</strong>
                                <div style="font-size:12px;opacity:0.7;margin-top:3px">
                                    ${new Date(inv.timestamp).toLocaleDateString()}
                                </div>
                            </div>
                            <div class="invite-actions">
                                <button class="btn btn-success btn-small" onclick="respondInvite('${inv.from}', true)">Akceptuj</button>
                                <button class="btn btn-danger btn-small" onclick="respondInvite('${inv.from}', false)">Odrzuć</button>
                            </div>
                        </div>
                    `).join('');
                } else {
                    inviteCount.style.display = 'none';
                    pendingDiv.innerHTML = '<div class="empty-state">Brak oczekujących zaproszeń</div>';
                }

            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function addFriend() {
            const friendUsername = document.getElementById('friendUsername').value.trim();
            if (!friendUsername) return;

            try {
                const response = await fetch(`${API_URL}/api/friends/add`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ fromUser: username, toUser: friendUsername })
                });

                if (response.ok) {
                    document.getElementById('friendUsername').value = '';
                    alert('Zaproszenie wysłane!');
                } else {
                    const data = await response.json();
                    alert(data.error || 'Błąd');
                }
            } catch (error) {
                alert('Błąd połączenia');
            }
        }

        async function respondInvite(fromUser, accept) {
            try {
                const response = await fetch(`${API_URL}/api/friends/respond`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ username, fromUser, accept })
                });

                if (response.ok) {
                    loadFriends();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        async function removeFriend(friendName) {
            if (!confirm(`Czy na pewno chcesz usunąć ${friendName} ze znajomych?`)) return;

            try {
                const response = await fetch(`${API_URL}/api/friends/remove`, {
                    method: 'DELETE',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ username, friendName })
                });

                if (response.ok) {
                    loadFriends();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        // Chat functions
        async function openChat(friendName) {
            currentChatFriend = friendName;
            document.getElementById('chatTitle').textContent = `Czat z ${friendName}`;
            document.getElementById('chatModal').classList.add('active');
            await loadChat();
            
            // Auto refresh
            chatRefreshInterval = setInterval(loadChat, 3000);
        }

        function closeChat() {
            document.getElementById('chatModal').classList.remove('active');
            currentChatFriend = null;
            if (chatRefreshInterval) {
                clearInterval(chatRefreshInterval);
            }
        }

        async function loadChat() {
            if (!currentChatFriend) return;

            try {
                const response = await fetch(`${API_URL}/api/chat/${username}/${currentChatFriend}`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                const data = await response.json();
                const messagesDiv = document.getElementById('chatMessages');
                
                if (data.messages) {
                    messagesDiv.innerHTML = data.messages.map(m => `
                        <div class="message ${m.sender === username ? 'sent' : 'received'}">
                            <div>${escapeHtml(m.content)}</div>
                            <div class="message-time">${new Date(m.timestamp).toLocaleTimeString()}</div>
                        </div>
                    `).join('');
                    
                    messagesDiv.scrollTop = messagesDiv.scrollHeight;
                }
            } catch (error) {
                console.error('Chat error:', error);
            }
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const content = input.value.trim();
            if (!content || !currentChatFriend) return;

            try {
                const response = await fetch(`${API_URL}/api/chat/send`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({
                        fromUser: username,
                        toUser: currentChatFriend,
                        content
                    })
                });

                if (response.ok) {
                    input.value = '';
                    await loadChat();
                }
            } catch (error) {
                console.error('Send error:', error);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        // Close modal on outside click
        document.getElementById('chatModal').addEventListener('click', (e) => {
            if (e.target.id === 'chatModal') closeChat();
        });
    </script>
</body>
</html>
