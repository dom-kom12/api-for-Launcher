<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Biblioteka - Nebula</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            color: #fff;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
        }

        /* Nawigacja */
        .nav {
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(10px);
            padding: 15px 0;
            margin-bottom: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .nav-content {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .logo {
            font-size: 24px;
            font-weight: bold;
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            cursor: pointer;
        }

        .nav-links {
            display: flex;
            gap: 20px;
            align-items: center;
        }

        .nav-links a {
            color: #fff;
            text-decoration: none;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .nav-links a:hover {
            opacity: 1;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 14px;
        }

        .logout-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: #fff;
            padding: 5px 15px;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s;
        }

        .logout-btn:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        /* Stats Bar */
        .stats-bar {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 15px;
            padding: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            text-align: center;
        }

        .stat-value {
            font-size: 36px;
            font-weight: bold;
            color: #00d4ff;
            margin-bottom: 5px;
        }

        .stat-label {
            font-size: 14px;
            opacity: 0.7;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        /* Games Grid */
        .section-title {
            font-size: 28px;
            margin-bottom: 25px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 25px;
        }

        .game-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            transition: all 0.3s;
        }

        .game-card:hover {
            transform: translateY(-5px);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        .game-header {
            position: relative;
            height: 150px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
        }

        .game-header img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .game-content {
            padding: 20px;
        }

        .game-title {
            font-size: 20px;
            margin-bottom: 10px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .game-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 15px;
            font-size: 13px;
            opacity: 0.8;
        }

        .game-meta span {
            display: flex;
            align-items: center;
            gap: 5px;
        }

        .install-status {
            display: inline-flex;
            align-items: center;
            gap: 5px;
            padding: 5px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: bold;
            margin-bottom: 15px;
        }

        .installed {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
        }

        .not-installed {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.7);
        }

        .game-actions {
            display: flex;
            gap: 10px;
        }

        .btn {
            flex: 1;
            padding: 10px;
            border: none;
            border-radius: 10px;
            cursor: pointer;
            font-size: 14px;
            transition: all 0.3s;
            text-align: center;
            text-decoration: none;
            color: #fff;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 20px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: rgba(255, 255, 255, 0.1);
        }

        .btn-secondary:hover {
            background: rgba(255, 255, 255, 0.2);
        }

        .btn-danger {
            background: rgba(255, 68, 68, 0.2);
            color: #ff4444;
        }

        .btn-danger:hover {
            background: rgba(255, 68, 68, 0.3);
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            opacity: 0.6;
        }

        .empty-state-icon {
            font-size: 64px;
            margin-bottom: 20px;
        }

        .loading {
            text-align: center;
            padding: 60px;
        }

        .spinner {
            border: 3px solid rgba(255, 255, 255, 0.1);
            border-top: 3px solid #00d4ff;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .playtime {
            font-size: 12px;
            opacity: 0.7;
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <nav class="nav">
        <div class="nav-content">
            <div class="logo" onclick="window.location.href='/'">NEBULA</div>
            <div class="nav-links">
                <a href="/">Gry</a>
                <a href="/library.html">Biblioteka</a>
                <a href="/friends.html">Znajomi</a>
                <div class="user-info">
                    <span id="usernameDisplay"></span>
                    <button class="logout-btn" onclick="logout()">Wyloguj</button>
                </div>
            </div>
        </div>
    </nav>

    <div class="container">
        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat-card">
                <div class="stat-value" id="totalGames">0</div>
                <div class="stat-label">Gier w bibliotece</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="installedGames">0</div>
                <div class="stat-label">Zainstalowanych</div>
            </div>
            <div class="stat-card">
                <div class="stat-value" id="totalPlaytime">0h</div>
                <div class="stat-label">Łączny czas gry</div>
            </div>
        </div>

        <h2 class="section-title">📚 Twoja biblioteka</h2>
        
        <div id="gamesContainer" class="games-grid">
            <div class="loading">
                <div class="spinner"></div>
                Ładowanie biblioteki...
            </div>
        </div>
    </div>

    <script>
        const API_URL = '';
        let currentUser = null;
        let libraryData = [];

        // Auth check
        const token = localStorage.getItem('token');
        const username = localStorage.getItem('username');
        
        if (!token || !username) {
            window.location.href = '/login.html';
        } else {
            currentUser = { username, token };
            document.getElementById('usernameDisplay').textContent = username;
            loadLibrary();
        }

        function logout() {
            localStorage.removeItem('token');
            localStorage.removeItem('username');
            window.location.href = '/login.html';
        }

        async function loadLibrary() {
            try {
                const response = await fetch(`${API_URL}/api/users/${username}/library`, {
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (!response.ok) throw new Error('Failed to load');

                libraryData = await response.json();
                renderLibrary();
                updateStats();

            } catch (error) {
                console.error('Error:', error);
                document.getElementById('gamesContainer').innerHTML = 
                    '<div class="empty-state">Błąd ładowania biblioteki</div>';
            }
        }

        function renderLibrary() {
            const container = document.getElementById('gamesContainer');
            
            if (libraryData.length === 0) {
                container.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <div class="empty-state-icon">🎮</div>
                        <h3>Twoja biblioteka jest pusta</h3>
                        <p>Przejdź do sklepu, aby dodać pierwszą grę!</p>
                        <br>
                        <a href="/" class="btn btn-primary" style="display:inline-block;padding:12px 30px;">Przeglądaj gry</a>
                    </div>
                `;
                return;
            }

            container.innerHTML = libraryData.map(item => {
                const game = item.gameDetails || {};
                const isInstalled = item.installed;
                
                return `
                    <div class="game-card">
                        <div class="game-header">
                            ${game.iconUrl ? 
                                `<img src="${game.iconUrl}" alt="${game.name}">` : 
                                (game.icon || '🎮')
                            }
                        </div>
                        <div class="game-content">
                            <h3 class="game-title">${game.name || 'Nieznana gra'}</h3>
                            <div class="game-meta">
                                <span>👨‍💻 ${game.developer || 'Unknown'}</span>
                                <span>🎯 ${game.genre || 'N/A'}</span>
                            </div>
                            
                            <div class="install-status ${isInstalled ? 'installed' : 'not-installed'}">
                                ${isInstalled ? '✓ Zainstalowane' : '⏳ Niezainstalowane'}
                            </div>

                            <div class="game-actions">
                                ${isInstalled ? 
                                    `<button class="btn btn-primary" onclick="playGame('${item.gameId}')">▶ Graj</button>` :
                                    `<button class="btn btn-primary" onclick="installGame('${item.gameId}')">⬇ Instaluj</button>`
                                }
                                <button class="btn btn-secondary" onclick="toggleInstall('${item.gameId}', ${!isInstalled})">
                                    ${isInstalled ? 'Odinstaluj' : 'Oznacz jako zainstalowane'}
                                </button>
                            </div>
                            
                            ${item.playTime ? 
                                `<div class="playtime">⏱ Czas gry: ${Math.floor(item.playTime / 60)}h ${item.playTime % 60}m</div>` : 
                                ''
                            }
                            
                            <div style="margin-top:10px;">
                                <button class="btn btn-danger" style="width:100%;" onclick="removeFromLibrary('${item.gameId}')">
                                    Usuń z biblioteki
                                </button>
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats() {
            document.getElementById('totalGames').textContent = libraryData.length;
            document.getElementById('installedGames').textContent = 
                libraryData.filter(g => g.installed).length;
            
            const totalMinutes = libraryData.reduce((sum, g) => sum + (g.playTime || 0), 0);
            document.getElementById('totalPlaytime').textContent = 
                Math.floor(totalMinutes / 60) + 'h';
        }

        async function toggleInstall(gameId, install) {
            try {
                const response = await fetch(`${API_URL}/api/users/${username}/library/${gameId}`, {
                    method: 'PUT',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${token}`
                    },
                    body: JSON.stringify({ installed: install })
                });

                if (response.ok) {
                    // Update local data
                    const item = libraryData.find(g => g.gameId === gameId);
                    if (item) {
                        item.installed = install;
                        renderLibrary();
                        updateStats();
                    }
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }

        function installGame(gameId) {
            toggleInstall(gameId, true);
        }

        function playGame(gameId) {
            alert('Uruchamianie gry... (funkcja demo)');
            // Tutaj można dodać przekierowanie do launcher'a lub pobieranie
        }

        async function removeFromLibrary(gameId) {
            if (!confirm('Czy na pewno chcesz usunąć tę grę z biblioteki?')) return;

            try {
                const response = await fetch(`${API_URL}/api/users/${username}/library/${gameId}`, {
                    method: 'DELETE',
                    headers: { 'Authorization': `Bearer ${token}` }
                });

                if (response.ok) {
                    libraryData = libraryData.filter(g => g.gameId !== gameId);
                    renderLibrary();
                    updateStats();
                }
            } catch (error) {
                console.error('Error:', error);
            }
        }
    </script>
</body>
</html>
