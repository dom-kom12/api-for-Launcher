<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Logowanie - Nebula</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #0f0c29 0%, #302b63 50%, #24243e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #fff;
        }

        .container {
            width: 100%;
            max-width: 450px;
            padding: 20px;
        }

        .logo {
            text-align: center;
            margin-bottom: 40px;
            font-size: 48px;
            font-weight: bold;
            background: linear-gradient(45deg, #00d4ff, #7b2cbf);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .form-container {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            padding: 40px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        .tabs {
            display: flex;
            margin-bottom: 30px;
            border-bottom: 2px solid rgba(255, 255, 255, 0.1);
        }

        .tab {
            flex: 1;
            padding: 15px;
            text-align: center;
            cursor: pointer;
            opacity: 0.6;
            transition: all 0.3s;
            border-bottom: 2px solid transparent;
            margin-bottom: -2px;
        }

        .tab.active {
            opacity: 1;
            border-bottom-color: #00d4ff;
            color: #00d4ff;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            font-size: 14px;
            opacity: 0.9;
        }

        input {
            width: 100%;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            transition: all 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #00d4ff;
            background: rgba(0, 0, 0, 0.5);
        }

        .btn {
            width: 100%;
            padding: 15px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            border: none;
            border-radius: 10px;
            color: #fff;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s;
            margin-top: 10px;
        }

        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 30px rgba(102, 126, 234, 0.4);
        }

        .btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .error {
            background: rgba(255, 0, 0, 0.2);
            color: #ff4444;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .success {
            background: rgba(0, 255, 136, 0.2);
            color: #00ff88;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 20px;
            display: none;
        }

        .back-link {
            text-align: center;
            margin-top: 20px;
        }

        .back-link a {
            color: #00d4ff;
            text-decoration: none;
            opacity: 0.8;
            transition: opacity 0.3s;
        }

        .back-link a:hover {
            opacity: 1;
        }

        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
            vertical-align: middle;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .form-section {
            display: none;
        }

        .form-section.active {
            display: block;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">NEBULA</div>
        
        <div class="form-container">
            <div class="tabs">
                <div class="tab active" onclick="switchTab('login')">Logowanie</div>
                <div class="tab" onclick="switchTab('register')">Rejestracja</div>
            </div>

            <div id="error" class="error"></div>
            <div id="success" class="success"></div>

            <!-- Login Form -->
            <div id="loginForm" class="form-section active">
                <div class="form-group">
                    <label for="loginUsername">Nazwa użytkownika</label>
                    <input type="text" id="loginUsername" placeholder="Wpisz nazwę użytkownika" required>
                </div>
                <div class="form-group">
                    <label for="loginPassword">Hasło</label>
                    <input type="password" id="loginPassword" placeholder="Wpisz hasło" required>
                </div>
                <button class="btn" onclick="login()" id="loginBtn">
                    Zaloguj się
                </button>
            </div>

            <!-- Register Form -->
            <div id="registerForm" class="form-section">
                <div class="form-group">
                    <label for="regUsername">Nazwa użytkownika</label>
                    <input type="text" id="regUsername" placeholder="Wybierz nazwę użytkownika" required>
                </div>
                <div class="form-group">
                    <label for="regEmail">Email (opcjonalnie)</label>
                    <input type="email" id="regEmail" placeholder="twój@email.com">
                </div>
                <div class="form-group">
                    <label for="regPassword">Hasło</label>
                    <input type="password" id="regPassword" placeholder="Wybierz hasło" required>
                </div>
                <div class="form-group">
                    <label for="regPasswordConfirm">Potwierdź hasło</label>
                    <input type="password" id="regPasswordConfirm" placeholder="Powtórz hasło" required>
                </div>
                <button class="btn" onclick="register()" id="registerBtn">
                    Zarejestruj się
                </button>
            </div>

            <div class="back-link">
                <a href="/">← Powrót do strony głównej</a>
            </div>
        </div>
    </div>

    <script>
        const API_URL = '';

        // Sprawdź czy już zalogowany
        if (localStorage.getItem('token')) {
            window.location.href = '/';
        }

        function switchTab(tab) {
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            document.querySelectorAll('.form-section').forEach(s => s.classList.remove('active'));
            
            if (tab === 'login') {
                document.querySelectorAll('.tab')[0].classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelectorAll('.tab')[1].classList.add('active');
                document.getElementById('registerForm').classList.add('active');
            }
            
            hideMessages();
        }

        function showError(msg) {
            document.getElementById('error').textContent = msg;
            document.getElementById('error').style.display = 'block';
            document.getElementById('success').style.display = 'none';
        }

        function showSuccess(msg) {
            document.getElementById('success').textContent = msg;
            document.getElementById('success').style.display = 'block';
            document.getElementById('error').style.display = 'none';
        }

        function hideMessages() {
            document.getElementById('error').style.display = 'none';
            document.getElementById('success').style.display = 'none';
        }

        function setLoading(btnId, loading) {
            const btn = document.getElementById(btnId);
            if (loading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="spinner"></span>Proszę czekać...';
            } else {
                btn.disabled = false;
                btn.innerHTML = btnId === 'loginBtn' ? 'Zaloguj się' : 'Zarejestruj się';
            }
        }

        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            const password = document.getElementById('loginPassword').value;

            if (!username || !password) {
                showError('Wypełnij wszystkie pola');
                return;
            }

            setLoading('loginBtn', true);

            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', data.user.username);
                    showSuccess('Zalogowano pomyślnie! Przekierowywanie...');
                    setTimeout(() => window.location.href = '/', 1000);
                } else {
                    showError(data.error || 'Błąd logowania');
                }
            } catch (error) {
                showError('Błąd połączenia z serwerem');
            } finally {
                setLoading('loginBtn', false);
            }
        }

        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const email = document.getElementById('regEmail').value.trim();
            const password = document.getElementById('regPassword').value;
            const passwordConfirm = document.getElementById('regPasswordConfirm').value;

            if (!username || !password) {
                showError('Wypełnij wymagane pola');
                return;
            }

            if (password !== passwordConfirm) {
                showError('Hasła nie są identyczne');
                return;
            }

            if (password.length < 4) {
                showError('Hasło musi mieć min. 4 znaki');
                return;
            }

            setLoading('registerBtn', true);

            try {
                const response = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, email })
                });

                const data = await response.json();

                if (response.ok && data.success) {
                    localStorage.setItem('token', data.token);
                    localStorage.setItem('username', username);
                    showSuccess('Konto utworzone! Przekierowywanie...');
                    setTimeout(() => window.location.href = '/', 1000);
                } else {
                    showError(data.error || 'Błąd rejestracji');
                }
            } catch (error) {
                showError('Błąd połączenia z serwerem');
            } finally {
                setLoading('registerBtn', false);
            }
        }

        // Enter key support
        document.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                if (document.getElementById('loginForm').classList.contains('active')) {
                    login();
                } else {
                    register();
                }
            }
        });
    </script>
</body>
</html>
