<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Admin - Zarządzanie Grami</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
        }
        
        .header {
            background: #12121a;
            padding: 20px 40px;
            border-bottom: 2px solid #00d4ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .header h1 {
            color: #00d4ff;
            font-size: 28px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #00d4ff;
            color: #000;
        }
        
        .btn-primary:hover {
            background: #33ddff;
        }
        
        .btn-success {
            background: #00ff88;
            color: #000;
        }
        
        .btn-danger {
            background: #ff3366;
            color: #fff;
        }
        
        .btn-warning {
            background: #ffaa00;
            color: #000;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }
        
        .toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
        }
        
        .search-box {
            flex: 1;
            min-width: 300px;
            padding: 12px 20px;
            background: #16161f;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .game-card {
            background: #16161f;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }
        
        .game-card:hover {
            transform: translateY(-5px);
            border-color: #00d4ff;
        }
        
        .game-header {
            height: 100px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            position: relative;
        }
        
        .game-pegi {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }
        
        .game-body {
            padding: 20px;
        }
        
        .game-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .game-dev {
            color: #a0a0b0;
            font-size: 13px;
            margin-bottom: 10px;
        }
        
        .game-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            font-size: 13px;
            color: #6a6a7a;
        }
        
        .game-desc {
            font-size: 13px;
            color: #a0a0b0;
            line-height: 1.5;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        
        .game-actions {
            display: flex;
            gap: 10px;
        }
        
        .game-actions .btn {
            flex: 1;
            padding: 10px;
            font-size: 13px;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-right: 5px;
        }
        
        .badge-free {
            background: #00ff88;
            color: #000;
        }
        
        .badge-paid {
            background: #ffaa00;
            color: #000;
        }
        
        .badge-platform {
            background: #ff3366;
            color: #fff;
        }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal {
            background: #16161f;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 25px;
            border-bottom: 1px solid #2a2a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h2 {
            color: #00d4ff;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
        }
        
        .modal-body {
            padding: 25px;
        }
        
        .form-group {
            margin-bottom: 20px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0b0;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: #0a0a0f;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }
        
        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .checkbox-group input[type="checkbox"] {
            width: 20px;
            height: 20px;
            accent-color: #00d4ff;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #6a6a7a;
        }
        
        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 8px;
            color: #fff;
            font-weight: bold;
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 2000;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .toast.success {
            background: #00ff88;
            color: #000;
        }
        
        .toast.error {
            background: #ff3366;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #00d4ff;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🌌 NEBULA ADMIN</h1>
        <div>
            <button class="btn btn-primary" onclick="openModal()">➕ Dodaj Grę</button>
        </div>
    </div>
    
    <div class="container">
        <div class="toolbar">
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 Szukaj gry..." onkeyup="filterGames()">
        </div>
        
        <div class="games-grid" id="gamesGrid">
            <div class="empty-state" style="grid-column: 1/-1;">
                <div class="loading"></div>
                <p>Ładowanie gier...</p>
            </div>
        </div>
    </div>
    
    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Dodaj Nową Grę</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="gameForm" onsubmit="saveGame(event)">
                    <input type="hidden" id="gameId">
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nazwa gry</label>
                            <input type="text" id="inputName" placeholder="Minecraft Launcher" required>
                        </div>
                        <div class="form-group">
                            <label>Developer</label>
                            <input type="text" id="inputDev" placeholder="Mojang">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Cena (zł)</label>
                            <input type="number" id="inputPrice" step="0.01" value="0" min="0">
                        </div>
                        <div class="form-group">
                            <label>PEGI</label>
                            <select id="inputPegi">
                                <option value="3">3</option>
                                <option value="7">7</option>
                                <option value="12" selected>12</option>
                                <option value="16">16</option>
                                <option value="18">18</option>
                            </select>
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Ikona (emoji)</label>
                            <input type="text" id="inputIcon" placeholder="🎮" maxlength="2">
                        </div>
                        <div class="form-group">
                            <label>Kolor (hex)</label>
                            <input type="color" id="inputColor" value="#00d4ff">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>URL Pobierania</label>
                        <input type="url" id="inputUrl" placeholder="https://...">
                    </div>
                    
                    <div class="form-group">
                        <label>Opis</label>
                        <textarea id="inputDesc" rows="3" placeholder="Krótki opis gry..."></textarea>
                    </div>
                    
                    <button type="submit" class="btn btn-success" style="width: 100%; padding: 15px;">
                        💾 Zapisz Grę
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        // 🔧 POPRAWIONY URL API - bez spacji, bez /api na końcu
        const API_URL = window.location.origin; // Używa tego samego hosta co strona
        
        let games = [];
        let editingId = null;

        // === API FUNCTIONS ===

        async function loadGames() {
            try {
                console.log('Ładowanie gier z:', `${API_URL}/games`);
                
                const response = await fetch(`${API_URL}/games`, {
                    method: 'GET',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }
                
                const data = await response.json();
                console.log('Załadowano gier:', data.length);
                
                // Konwertuj tablicę na obiekt jeśli trzeba
                games = Array.isArray(data) ? data : Object.values(data);
                renderGames();
                
            } catch (error) {
                console.error('Błąd ładowania:', error);
                showToast('Błąd ładowania gier: ' + error.message, 'error');
                
                document.getElementById('gamesGrid').innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <h3>⚠️ Błąd połączenia</h3>
                        <p>${error.message}</p>
                        <button class="btn btn-primary" onclick="loadGames()" style="margin-top: 20px;">
                            🔄 Spróbuj ponownie
                        </button>
                    </div>
                `;
            }
        }

        async function saveGameToServer(gameData) {
            try {
                const url = editingId 
                    ? `${API_URL}/api/games/${editingId}` 
                    : `${API_URL}/api/games`;
                
                const method = editingId ? 'PUT' : 'POST';
                
                console.log('Zapisywanie gry:', method, url, gameData);
                
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(gameData)
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
                
                const result = await response.json();
                console.log('Zapisano:', result);
                
                showToast(editingId ? 'Zaktualizowano grę!' : 'Dodano nową grę!', 'success');
                await loadGames();
                return true;
                
            } catch (error) {
                console.error('Błąd zapisywania:', error);
                showToast('Błąd: ' + error.message, 'error');
                return false;
            }
        }

        async function deleteGameFromServer(id) {
            try {
                const response = await fetch(`${API_URL}/api/games/${id}`, {
                    method: 'DELETE',
                    headers: {
                        'Accept': 'application/json'
                    }
                });
                
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                
                showToast('Usunięto grę!', 'success');
                await loadGames();
                
            } catch (error) {
                console.error('Błąd usuwania:', error);
                showToast('Błąd usuwania: ' + error.message, 'error');
            }
        }

        // === UI FUNCTIONS ===

        function renderGames() {
            const grid = document.getElementById('gamesGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            grid.innerHTML = '';
            
            const filtered = games.filter(game => {
                const name = (game.name || '').toLowerCase();
                const dev = (game.developer || '').toLowerCase();
                return name.includes(search) || dev.includes(search);
            });
            
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <h3>📂 Brak gier</h3>
                        <p>${search ? 'Nie znaleziono pasujących gier' : 'Dodaj pierwszą grę używając przycisku powyżej'}</p>
                    </div>
                `;
                return;
            }
            
            filtered.forEach(game => {
                const isFree = game.price === 0;
                
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <div class="game-header" style="background: ${game.color || '#00d4ff'}20;">
                        <span>${game.icon || '🎮'}</span>
                        <span class="game-pegi">PEGI ${game.pegi || 12}</span>
                    </div>
                    <div class="game-body">
                        <div class="game-title">${game.name}</div>
                        <div class="game-dev">${game.developer || 'Unknown'}</div>
                        <div style="margin-bottom: 10px;">
                            ${isFree ? '<span class="badge badge-free">DARMOWE</span>' : `<span class="badge badge-paid">${game.price} zł</span>`}
                        </div>
                        <div class="game-desc">${game.description || 'Brak opisu'}</div>
                        <div class="game-actions">
                            <button class="btn btn-primary" onclick="editGame('${game.id}')">✏️ Edytuj</button>
                            <button class="btn btn-danger" onclick="deleteGame('${game.id}')">🗑️ Usuń</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterGames() {
            renderGames();
        }

        function openModal(id = null) {
            editingId = id;
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modalTitle').textContent = id ? 'Edytuj Grę' : 'Dodaj Nową Grę';
            
            if (id) {
                const game = games.find(g => g.id === id);
                if (game) {
                    document.getElementById('inputName').value = game.name || '';
                    document.getElementById('inputDev').value = game.developer || '';
                    document.getElementById('inputPrice').value = game.price || 0;
                    document.getElementById('inputPegi').value = game.pegi || 12;
                    document.getElementById('inputIcon').value = game.icon || '';
                    document.getElementById('inputColor').value = game.color || '#00d4ff';
                    document.getElementById('inputUrl').value = game.download_url || '';
                    document.getElementById('inputDesc').value = game.description || '';
                }
            } else {
                document.getElementById('gameForm').reset();
                document.getElementById('inputColor').value = '#00d4ff';
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            editingId = null;
        }

        async function saveGame(e) {
            e.preventDefault();
            
            const gameData = {
                name: document.getElementById('inputName').value,
                developer: document.getElementById('inputDev').value,
                price: parseFloat(document.getElementById('inputPrice').value) || 0,
                pegi: parseInt(document.getElementById('inputPegi').value) || 12,
                icon: document.getElementById('inputIcon').value || '🎮',
                color: document.getElementById('inputColor').value,
                download_url: document.getElementById('inputUrl').value || null,
                description: document.getElementById('inputDesc').value,
                id: editingId // Dla PUT, serwer użyje tego ID
            };
            
            const success = await saveGameToServer(gameData);
            if (success) {
                closeModal();
            }
        }

        function editGame(id) {
            openModal(id);
        }

        async function deleteGame(id) {
            const game = games.find(g => g.id === id);
            if (!confirm(`Czy na pewno chcesz usunąć "${game?.name || id}"?`)) return;
            await deleteGameFromServer(id);
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Inicjalizacja
        loadGames();

        // Zamknij modal po kliknięciu poza nim
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });
    </script>
</body>
</html>
