<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Launcher</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
        }
        
        .header {
            background: #12121a;
            padding: 20px 40px;
            border-bottom: 2px solid #00d4ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .header h1 {
            color: #00d4ff;
            font-size: 28px;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .username {
            color: #a0a0b0;
            font-size: 14px;
        }

        .logout-btn {
            background: #ff3366;
            color: #fff;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #00d4ff;
            color: #000;
        }
        
        .btn-primary:hover {
            background: #33ddff;
        }
        
        .btn-success {
            background: #00ff88;
            color: #000;
        }

        .btn-success:disabled {
            background: #2a3a2a;
            color: #666;
            cursor: not-allowed;
        }
        
        .btn-danger {
            background: #ff3366;
            color: #fff;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        .toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .search-box {
            flex: 1;
            min-width: 300px;
            padding: 12px 20px;
            background: #16161f;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }
        
        .game-card {
            background: #16161f;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }
        
        .game-card:hover {
            transform: translateY(-5px);
            border-color: #00d4ff;
        }
        
        .game-header {
            height: 150px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            position: relative;
            background-size: cover;
            background-position: center;
        }
        
        .game-header img {
            width: 80px;
            height: 80px;
            object-fit: cover;
            border-radius: 16px;
        }
        
        .game-pegi {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .game-size {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .game-body {
            padding: 20px;
        }
        
        .game-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .game-dev {
            color: #a0a0b0;
            font-size: 13px;
            margin-bottom: 10px;
        }
        
        .game-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            font-size: 13px;
            color: #6a6a7a;
        }
        
        .game-desc {
            font-size: 13px;
            color: #a0a0b0;
            line-height: 1.5;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .screenshots-preview {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            overflow-x: auto;
        }

        .screenshot-thumb {
            width: 80px;
            height: 45px;
            background: #0a0a0f;
            border-radius: 4px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #2a2a3a;
            overflow: hidden;
            border: 1px solid #2a2a3a;
        }

        .screenshot-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .screenshot-count {
            background: #00d4ff;
            color: #000;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 5px;
        }

        .screenshot-viewer {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            z-index: 3000;
            display: none;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .screenshot-viewer.active {
            display: flex;
        }

        .screenshot-viewer img {
            max-width: 90%;
            max-height: 90%;
            object-fit: contain;
            border-radius: 8px;
        }

        .screenshot-viewer .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: #ff3366;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 16px;
        }

        .screenshot-viewer .nav-btn {
            position: absolute;
            top: 50%;
            transform: translateY(-50%);
            background: rgba(0,212,255,0.8);
            color: #000;
            border: none;
            padding: 15px 20px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 24px;
            font-weight: bold;
        }

        .screenshot-viewer .nav-btn:hover {
            background: #00d4ff;
        }

        .screenshot-viewer .prev-btn { left: 20px; }
        .screenshot-viewer .next-btn { right: 20px; }
        
        .game-requirements {
            background: #0a0a0f;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 12px;
        }

        .game-requirements summary {
            cursor: pointer;
            color: #00d4ff;
            font-weight: bold;
        }

        .req-section {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #2a2a3a;
        }

        .req-section h4 {
            color: #ffaa00;
            margin-bottom: 5px;
            font-size: 11px;
            text-transform: uppercase;
        }

        .req-item {
            display: flex;
            justify-content: space-between;
            margin: 3px 0;
            color: #a0a0b0;
        }
        
        .game-actions {
            display: flex;
            gap: 10px;
        }
        
        .game-actions .btn {
            flex: 1;
            padding: 10px;
            font-size: 13px;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-right: 5px;
        }
        
        .badge-free {
            background: #00ff88;
            color: #000;
        }
        
        .badge-paid {
            background: #ffaa00;
            color: #000;
        }

        .badge-new {
            background: #00d4ff;
            color: #000;
        }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
        .modal-overlay.active {
            display: flex;
        }
        
        .modal {
            background: #16161f;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            width: 90%;
            max-width: 600px;
            max-height: 90vh;
            overflow-y: auto;
        }
        
        .modal-header {
            padding: 25px;
            border-bottom: 1px solid #2a2a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        .modal-header h2 {
            color: #00d4ff;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
        }
        
        .modal-body {
            padding: 25px;
        }

        .library-section {
            margin-top: 30px;
        }

        .library-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 15px;
            border-bottom: 1px solid #2a2a3a;
        }

        .library-header h2 {
            color: #00d4ff;
        }

        .game-detail-screenshots {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 10px;
            margin: 20px 0;
        }

        .game-detail-screenshot {
            aspect-ratio: 16/9;
            background: #0a0a0f;
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            border: 1px solid #2a2a3a;
            transition: transform 0.2s;
        }

        .game-detail-screenshot:hover {
            transform: scale(1.05);
            border-color: #00d4ff;
        }

        .game-detail-screenshot img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #6a6a7a;
        }
        
        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 8px;
            color: #fff;
            font-weight: bold;
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 2000;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .toast.success {
            background: #00ff88;
            color: #000;
        }
        
        .toast.error {
            background: #ff3366;
        }

        .toast.info {
            background: #00d4ff;
            color: #000;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #00d4ff;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .login-container {
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .login-box {
            background: #16161f;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            padding: 40px;
            width: 100%;
            max-width: 400px;
        }

        .login-box h2 {
            color: #00d4ff;
            text-align: center;
            margin-bottom: 30px;
        }

        .login-box .form-group {
            margin-bottom: 20px;
        }

        .login-box label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0b0;
            font-size: 13px;
        }

        .login-box input {
            width: 100%;
            padding: 12px 15px;
            background: #0a0a0f;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }

        .login-box button {
            width: 100%;
            padding: 15px;
            margin-top: 10px;
        }

        .login-tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .login-tab {
            flex: 1;
            padding: 10px;
            background: #0a0a0f;
            border: 1px solid #2a2a3a;
            color: #6a6a7a;
            cursor: pointer;
            border-radius: 8px;
            text-align: center;
        }

        .login-tab.active {
            background: #00d4ff;
            color: #000;
            border-color: #00d4ff;
        }

        .hidden {
            display: none !important;
        }

        .rating {
            display: flex;
            gap: 5px;
            margin: 10px 0;
        }

        .star {
            color: #ffaa00;
            font-size: 16px;
        }

        .star.empty {
            color: #2a2a3a;
        }

        .comments-section {
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #2a2a3a;
        }

        .comment {
            background: #0a0a0f;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 10px;
        }

        .comment-header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 12px;
        }

        .comment-author {
            color: #00d4ff;
            font-weight: bold;
        }

        .comment-date {
            color: #6a6a7a;
        }

        .comment-text {
            color: #a0a0b0;
            font-size: 13px;
            line-height: 1.5;
        }

        .add-comment {
            margin-top: 15px;
        }

        .add-comment textarea {
            width: 100%;
            padding: 12px;
            background: #0a0a0f;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            color: #fff;
            resize: vertical;
            min-height: 80px;
        }

        .add-comment button {
            margin-top: 10px;
        }
    </style>
</head>
<body>
    <!-- Screenshot Viewer -->
    <div class="screenshot-viewer" id="screenshotViewer">
        <button class="close-btn" onclick="closeScreenshotViewer()">✕ Zamknij</button>
        <button class="nav-btn prev-btn" onclick="prevScreenshot()">‹</button>
        <img src="" alt="Screenshot" id="viewerImage">
        <button class="nav-btn next-btn" onclick="nextScreenshot()">›</button>
    </div>

    <!-- Login Screen -->
    <div class="login-container" id="loginScreen">
        <div class="login-box">
            <h2>🌌 NEBULA LAUNCHER</h2>
            <div class="login-tabs">
                <div class="login-tab active" onclick="switchTab('login')">Logowanie</div>
                <div class="login-tab" onclick="switchTab('register')">Rejestracja</div>
            </div>
            
            <form id="loginForm" onsubmit="handleLogin(event)">
                <div class="form-group">
                    <label>Nazwa użytkownika</label>
                    <input type="text" id="loginUsername" required>
                </div>
                <div class="form-group">
                    <label>Hasło</label>
                    <input type="password" id="loginPassword" required>
                </div>
                <button type="submit" class="btn btn-primary">Zaloguj się</button>
            </form>

            <form id="registerForm" class="hidden" onsubmit="handleRegister(event)">
                <div class="form-group">
                    <label>Nazwa użytkownika</label>
                    <input type="text" id="regUsername" required>
                </div>
                <div class="form-group">
                    <label>Hasło</label>
                    <input type="password" id="regPassword" required>
                </div>
                <div class="form-group">
                    <label>Email (opcjonalnie)</label>
                    <input type="email" id="regEmail">
                </div>
                <button type="submit" class="btn btn-success">Zarejestruj się</button>
            </form>
        </div>
    </div>

    <!-- Main App -->
    <div id="mainApp" class="hidden">
        <div class="header">
            <div>
                <h1>🌌 NEBULA LAUNCHER</h1>
            </div>
            <div class="user-info">
                <span class="username" id="usernameDisplay"></span>
                <button class="btn btn-primary" onclick="showLibrary()">📚 Moja Biblioteka</button>
                <button class="logout-btn" onclick="logout()">Wyloguj</button>
            </div>
        </div>
        
        <div class="container">
            <div class="toolbar">
                <input type="text" class="search-box" id="searchInput" placeholder="🔍 Szukaj gry..." onkeyup="filterGames()">
                <button class="btn btn-secondary" onclick="refreshData()">🔄 Odśwież</button>
            </div>

            <div class="games-grid" id="gamesGrid">
                <div class="empty-state" style="grid-column: 1/-1;">
                    <div class="loading"></div>
                    <p>Ładowanie gier...</p>
                </div>
            </div>

            <div class="library-section hidden" id="librarySection">
                <div class="library-header">
                    <h2>📚 Moja Biblioteka</h2>
                    <button class="btn btn-secondary" onclick="hideLibrary()">← Powrót do sklepu</button>
                </div>
                <div class="games-grid" id="libraryGrid">
                    <div class="empty-state">
                        <p>Ładowanie biblioteki...</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Game Detail Modal -->
    <div class="modal-overlay" id="gameModal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalGameTitle">Szczegóły gry</h2>
                <button class="modal-close" onclick="closeGameModal()">&times;</button>
            </div>
            <div class="modal-body" id="modalGameBody">
                <!-- Dynamic content -->
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        const API_URL = "https://api-for-launcher.onrender.com";
        
        let games = [];
        let library = [];
        let currentUser = null;
        let currentGame = null;
        let currentScreenshots = [];
        let currentScreenshotIndex = 0;

        // Check if already logged in
        const token = localStorage.getItem('nebula_token');
        const savedUser = localStorage.getItem('nebula_user');
        
        if (token && savedUser) {
            currentUser = JSON.parse(savedUser);
            showMainApp();
            loadGames();
            loadLibrary();
        }

        function switchTab(tab) {
            document.querySelectorAll('.login-tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            if (tab === 'login') {
                document.getElementById('loginForm').classList.remove('hidden');
                document.getElementById('registerForm').classList.add('hidden');
            } else {
                document.getElementById('loginForm').classList.add('hidden');
                document.getElementById('registerForm').classList.remove('hidden');
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            const username = document.getElementById('loginUsername').value;
            const password = document.getElementById('loginPassword').value;

            try {
                const response = await fetch(`${API_URL}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Błąd logowania');
                }

                const data = await response.json();
                currentUser = data.user;
                localStorage.setItem('nebula_token', data.token);
                localStorage.setItem('nebula_user', JSON.stringify(data.user));
                
                showMainApp();
                loadGames();
                loadLibrary();
                showToast('Zalogowano pomyślnie!', 'success');
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            const username = document.getElementById('regUsername').value;
            const password = document.getElementById('regPassword').value;
            const email = document.getElementById('regEmail').value;

            try {
                const response = await fetch(`${API_URL}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ username, password, email })
                });

                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.error || 'Błąd rejestracji');
                }

                const data = await response.json();
                showToast('Zarejestrowano! Możesz się zalogować.', 'success');
                switchTab('login');
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        function showMainApp() {
            document.getElementById('loginScreen').classList.add('hidden');
            document.getElementById('mainApp').classList.remove('hidden');
            document.getElementById('usernameDisplay').textContent = currentUser?.username || '';
        }

        function logout() {
            localStorage.removeItem('nebula_token');
            localStorage.removeItem('nebula_user');
            currentUser = null;
            location.reload();
        }

        async function loadGames() {
            try {
                const response = await fetch(`${API_URL}/games`);
                if (!response.ok) throw new Error('Błąd ładowania gier');
                
                games = await response.json();
                renderGames();
            } catch (error) {
                console.error('Błąd:', error);
                showToast('Błąd ładowania gier', 'error');
            }
        }

        async function loadLibrary() {
            if (!currentUser) return;
            
            try {
                const response = await fetch(`${API_URL}/api/users/${currentUser.username}/library`, {
                    headers: {
                        'Authorization': `Bearer ${localStorage.getItem('nebula_token')}`
                    }
                });
                
                if (!response.ok) throw new Error('Błąd ładowania biblioteki');
                
                library = await response.json();
            } catch (error) {
                console.error('Błąd biblioteki:', error);
            }
        }

        function renderGames() {
            const grid = document.getElementById('gamesGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            grid.innerHTML = '';
            
            const filtered = games.filter(game => {
                const name = (game.name || '').toLowerCase();
                const dev = (game.developer || '').toLowerCase();
                const genre = (game.genre || '').toLowerCase();
                return name.includes(search) || dev.includes(search) || genre.includes(search);
            });
            
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <h3>📂 Brak gier</h3>
                        <p>${search ? 'Nie znaleziono pasujących gier' : 'Dodaj pierwszą grę używając przycisku powyżej'}</p>
                    </div>
                `;
                return;
            }
            
            filtered.forEach(game => {
                const isFree = game.price === 0;
                const size = game.size ? `${game.size} GB` : 'N/A';
                const compat = checkGameCompatibility(game);
                const screenshots = game.screenshots || [];
                
                // DEKLARACJA hasValidIcon PRZED UŻYCIEM
                const hasValidIcon = game.iconUrl || game.icon;
                
                let iconHtml;
                if (game.iconUrl) {
                    iconHtml = `<img src="${game.iconUrl}" alt="${game.name}" style="width: 80px; height: 80px; object-fit: cover; border-radius: 16px;">`;
                } else {
                    iconHtml = `<span style="font-size: 60px;">${game.icon || '🎮'}</span>`;
                }
                
                let reqHtml = '';
                if (game.requirements && (game.requirements.min || game.requirements.rec)) {
                    const min = game.requirements.min || {};
                    const rec = game.requirements.rec || {};
                    
                    reqHtml = `
                        <details class="game-requirements">
                            <summary>🖥️ Wymagania systemowe</summary>
                            ${min.os ? `
                            <div class="req-section">
                                <h4>Minimalne</h4>
                                ${min.os ? `<div class="req-item"><span>OS:</span><span>${min.os}</span></div>` : ''}
                                ${min.cpu ? `<div class="req-item"><span>CPU:</span><span>${min.cpu}</span></div>` : ''}
                                ${min.ram ? `<div class="req-item"><span>RAM:</span><span>${min.ram}</span></div>` : ''}
                                ${min.gpu ? `<div class="req-item"><span>GPU:</span><span>${min.gpu}</span></div>` : ''}
                                ${min.storage ? `<div class="req-item"><span>Dysk:</span><span>${min.storage}</span></div>` : ''}
                            </div>` : ''}
                            ${rec.os ? `
                            <div class="req-section">
                                <h4>Rekomendowane</h4>
                                ${rec.os ? `<div class="req-item"><span>OS:</span><span>${rec.os}</span></div>` : ''}
                                ${rec.cpu ? `<div class="req-item"><span>CPU:</span><span>${rec.cpu}</span></div>` : ''}
                                ${rec.ram ? `<div class="req-item"><span>RAM:</span><span>${rec.ram}</span></div>` : ''}
                                ${rec.gpu ? `<div class="req-item"><span>GPU:</span><span>${rec.gpu}</span></div>` : ''}
                                ${rec.storage ? `<div class="req-item"><span>Dysk:</span><span>${rec.storage}</span></div>` : ''}
                            </div>` : ''}
                        </details>
                    `;
                }

                let screenshotsHtml = '';
                if (screenshots.length > 0) {
                    screenshotsHtml = `
                        <div class="screenshots-preview">
                            ${screenshots.slice(0, 3).map(url => `
                                <div class="screenshot-thumb">
                                    <img src="${url}" alt="" onerror="this.style.display='none'">
                                </div>
                            `).join('')}
                            ${screenshots.length > 3 ? `<div class="screenshot-thumb" style="background: #00d4ff; color: #000; font-size: 12px; font-weight: bold;">+${screenshots.length - 3}</div>` : ''}
                        </div>
                    `;
                }

                let compatBadge = '';
                if (userPC) {
                    if (compat.compatible) {
                        compatBadge = '<span class="badge" style="background: #00ff88; color: #000;">✓ Działa</span>';
                    } else {
                        compatBadge = `<span class="badge" style="background: #ff3366; color: #fff;" title="${compat.reason}">✖ ${compat.reason}</span>`;
                    }
                }
                
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <div class="game-header" style="background: ${game.color || '#00d4ff'}20;">
                        ${iconHtml}
                        <span class="game-pegi">PEGI ${game.pegi || 12}</span>
                        <span class="game-size">💾 ${size}</span>
                    </div>
                    <div class="game-body">
                        <div class="game-title">${game.name} ${compatBadge}</div>
                        <div class="game-dev">${game.developer || 'Unknown'} ${game.genre ? `• ${game.genre}` : ''}</div>
                        <div style="margin-bottom: 10px;">
                            ${isFree ? '<span class="badge badge-free">DARMOWE</span>' : `<span class="badge badge-paid">${game.price} zł</span>`}
                            ${screenshots.length > 0 ? `<span class="screenshot-count">📸 ${screenshots.length}</span>` : ''}
                        </div>
                        <div class="game-desc">${game.description || 'Brak opisu'}</div>
                        ${screenshotsHtml}
                        ${reqHtml}
                        <div class="game-actions">
                            <button class="btn btn-primary btn-icon" onclick="editGame('${game.id}')">✏️ Edytuj</button>
                            ${compat.compatible ? 
                                `<button class="btn btn-success btn-icon" onclick="downloadGame('${game.id}')">⬇️ Pobierz</button>` :
                                `<button class="btn btn-success btn-icon" disabled title="${compat.reason}">⛔ Brak wsparcia</button>`
                            }
                            <button class="btn btn-danger btn-icon" onclick="deleteGame('${game.id}')">🗑️</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }
        function openScreenshotViewer(gameId, startIndex) {
            const game = games.find(g => g.id === gameId);
            if (!game || !game.screenshots || game.screenshots.length === 0) return;
            
            currentGame = game;
            currentScreenshots = game.screenshots;
            currentScreenshotIndex = startIndex;
            
            updateViewerImage();
            document.getElementById('screenshotViewer').classList.add('active');
        }

        function updateViewerImage() {
            const img = document.getElementById('viewerImage');
            img.src = currentScreenshots[currentScreenshotIndex];
        }

        function closeScreenshotViewer() {
            document.getElementById('screenshotViewer').classList.remove('active');
            currentScreenshots = [];
            currentScreenshotIndex = 0;
        }

        function prevScreenshot() {
            if (currentScreenshots.length === 0) return;
            currentScreenshotIndex = (currentScreenshotIndex - 1 + currentScreenshots.length) % currentScreenshots.length;
            updateViewerImage();
        }

        function nextScreenshot() {
            if (currentScreenshots.length === 0) return;
            currentScreenshotIndex = (currentScreenshotIndex + 1) % currentScreenshots.length;
            updateViewerImage();
        }

        function showGameDetail(game) {
            currentGame = game;
            const modal = document.getElementById('gameModal');
            const body = document.getElementById('modalGameBody');
            const isFree = game.price === 0;
            const inLibrary = library.some(l => l.gameId === game.id);
            
            // POPRAWKA: Lepsza obsługa screenshotów w modalu
            const screenshots = game.screenshots || [];
            let screenshotsSection = '';
            if (screenshots.length > 0) {
                screenshotsSection = `
                    <div class="section-title">📸 Screenshoty</div>
                    <div class="game-detail-screenshots">
                        ${screenshots.map((url, idx) => `
                            <div class="game-detail-screenshot" onclick="openScreenshotViewer('${game.id}', ${idx})">
                                <img src="${url}" alt="Screenshot ${idx + 1}" 
                                    onerror="this.style.display='none'; this.parentElement.style.background='#0a0a0f'; this.parentElement.innerHTML='<div style=\\'display:flex;align-items:center;justify-content:center;height:100%;color:#2a2a3a;\\'>📷</div>';"
                                    onload="this.style.display='block';"
                                >
                            </div>
                        `).join('')}
                    </div>
                `;
            }

            let requirementsSection = '';
            if (game.requirements && (game.requirements.min || game.requirements.rec)) {
                const min = game.requirements.min || {};
                const rec = game.requirements.rec || {};
                
                requirementsSection = `
                    <div class="section-title">🖥️ Wymagania systemowe</div>
                    <div class="game-requirements" style="display: block;">
                        ${min.os ? `
                        <div class="req-section">
                            <h4>Minimalne</h4>
                            ${min.os ? `<div class="req-item"><span>OS:</span><span>${min.os}</span></div>` : ''}
                            ${min.cpu ? `<div class="req-item"><span>CPU:</span><span>${min.cpu}</span></div>` : ''}
                            ${min.ram ? `<div class="req-item"><span>RAM:</span><span>${min.ram}</span></div>` : ''}
                            ${min.gpu ? `<div class="req-item"><span>GPU:</span><span>${min.gpu}</span></div>` : ''}
                            ${min.storage ? `<div class="req-item"><span>Dysk:</span><span>${min.storage}</span></div>` : ''}
                        </div>` : ''}
                        ${rec.os ? `
                        <div class="req-section">
                            <h4>Rekomendowane</h4>
                            ${rec.os ? `<div class="req-item"><span>OS:</span><span>${rec.os}</span></div>` : ''}
                            ${rec.cpu ? `<div class="req-item"><span>CPU:</span><span>${rec.cpu}</span></div>` : ''}
                            ${rec.ram ? `<div class="req-item"><span>RAM:</span><span>${rec.ram}</span></div>` : ''}
                            ${rec.gpu ? `<div class="req-item"><span>GPU:</span><span>${rec.gpu}</span></div>` : ''}
                            ${rec.storage ? `<div class="req-item"><span>Dysk:</span><span>${rec.storage}</span></div>` : ''}
                        </div>` : ''}
                    </div>
                `;
            }

            let iconHtml;
            if (game.iconUrl) {
                iconHtml = `<img src="${game.iconUrl}" alt="${game.name}" style="width: 100px; height: 100px; object-fit: cover; border-radius: 16px;" onerror="this.style.display='none'; this.parentElement.innerHTML='<span style=\\'font-size: 80px;\\'>🎮</span>';">`;
            } else {
                iconHtml = `<span style="font-size: 80px;">${game.icon || '🎮'}</span>`;
            }

            body.innerHTML = `
                <div style="text-align: center; margin-bottom: 20px;">
                    <div style="display: inline-block; padding: 20px; background: ${game.color || '#00d4ff'}20; border-radius: 20px;">
                        ${iconHtml}
                    </div>
                    <h2 style="margin-top: 15px; color: #00d4ff;">${game.name}</h2>
                    <p style="color: #a0a0b0;">${game.developer || 'Unknown'} ${game.publisher ? `• ${game.publisher}` : ''}</p>
                </div>
                
                <div style="display: flex; justify-content: center; gap: 10px; margin-bottom: 20px; flex-wrap: wrap;">
                    ${isFree ? '<span class="badge badge-free">DARMOWE</span>' : `<span class="badge badge-paid">${game.price} zł</span>`}
                    <span class="badge" style="background: #2a2a3a; color: #fff;">PEGI ${game.pegi || 12}</span>
                    ${game.genre ? `<span class="badge" style="background: #2a2a3a; color: #fff;">${game.genre}</span>` : ''}
                    ${game.version ? `<span class="badge" style="background: #2a2a3a; color: #fff;">v${game.version}</span>` : ''}
                    ${inLibrary ? '<span class="badge badge-new">W BIBLIOTECE</span>' : ''}
                </div>

                <div class="game-desc" style="text-align: center; margin-bottom: 20px; font-size: 14px;">
                    ${game.description || 'Brak opisu'}
                </div>

                ${screenshotsSection}
                ${requirementsSection}

                <div style="display: flex; gap: 10px; margin-top: 20px;">
                    ${inLibrary ? 
                        `<button class="btn btn-success" style="flex: 1;" onclick="downloadGame('${game.id}')">⬇️ Pobierz</button>` :
                        `<button class="btn btn-primary" style="flex: 1;" onclick="addToLibrary('${game.id}')">➕ Dodaj do biblioteki</button>`
                    }
                    <button class="btn btn-secondary" onclick="closeGameModal()">Zamknij</button>
                </div>
            `;
            
            document.getElementById('modalGameTitle').textContent = game.name;
            modal.classList.add('active');
            
            // Załaduj komentarze
            loadComments(game.id);
        }

        async function loadComments(gameId) {
            try {
                const response = await fetch(`${API_URL}/api/games/${gameId}/comments`);
                if (!response.ok) return;
                
                const data = await response.json();
                // Można dodać wyświetlanie komentarzy w modalu
            } catch (error) {
                console.error('Błąd ładowania komentarzy:', error);
            }
        }

        function closeGameModal() {
            document.getElementById('gameModal').classList.remove('active');
            currentGame = null;
        }

        async function addToLibrary(gameId) {
            if (!currentUser) {
                showToast('Zaloguj się aby dodać grę do biblioteki', 'error');
                return;
            }

            try {
                const response = await fetch(`${API_URL}/api/users/${currentUser.username}/library`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${localStorage.getItem('nebula_token')}`
                    },
                    body: JSON.stringify({ gameId })
                });

                if (!response.ok) throw new Error('Błąd dodawania do biblioteki');

                showToast('Dodano do biblioteki!', 'success');
                await loadLibrary();
                closeGameModal();
                renderGames();
            } catch (error) {
                showToast(error.message, 'error');
            }
        }

        function downloadGame(gameId) {
            const game = games.find(g => g.id === gameId);
            if (!game || !game.download_url) {
                showToast('Brak linku do pobrania', 'error');
                return;
            }
            window.open(game.download_url, '_blank');
        }

        function showLibrary() {
            document.getElementById('librarySection').classList.remove('hidden');
            document.getElementById('gamesGrid').parentElement.classList.add('hidden');
            renderLibrary();
        }

        function hideLibrary() {
            document.getElementById('librarySection').classList.add('hidden');
            document.getElementById('gamesGrid').parentElement.classList.remove('hidden');
        }

        function renderLibrary() {
            const grid = document.getElementById('libraryGrid');
            
            if (library.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <h3>📚 Pusta biblioteka</h3>
                        <p>Dodaj gry ze sklepu do swojej biblioteki</p>
                    </div>
                `;
                return;
            }

            grid.innerHTML = '';
            
            library.forEach(item => {
                const game = games.find(g => g.id === item.gameId);
                if (!game) return;

                const isFree = game.price === 0;
                
                let iconHtml;
                if (game.iconUrl) {
                    iconHtml = `<img src="${game.iconUrl}" alt="${game.name}" onerror="this.style.display='none'; this.parentElement.innerHTML='<span style=\\'font-size: 60px;\\'>🎮</span>';">`;
                } else {
                    iconHtml = `<span style="font-size: 60px;">${game.icon || '🎮'}</span>`;
                }
                
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <div class="game-header" style="background: ${game.color || '#00d4ff'}20;">
                        ${iconHtml}
                    </div>
                    <div class="game-body">
                        <div class="game-title">${game.name}</div>
                        <div class="game-dev">${game.developer || 'Unknown'}</div>
                        <div style="margin-bottom: 10px;">
                            ${isFree ? '<span class="badge badge-free">DARMOWE</span>' : `<span class="badge badge-paid">${game.price} zł</span>`}
                        </div>
                        <div class="game-actions">
                            <button class="btn btn-success" onclick="downloadGame('${game.id}')">⬇️ Pobierz</button>
                            <button class="btn btn-primary" onclick="showGameDetail(games.find(g => g.id === '${game.id}'))">Szczegóły</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function filterGames() {
            renderGames();
        }

        function refreshData() {
            showToast('Odświeżanie...', 'info');
            loadGames();
            if (currentUser) loadLibrary();
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Keyboard navigation for screenshot viewer
        document.addEventListener('keydown', (e) => {
            if (!document.getElementById('screenshotViewer').classList.contains('active')) return;
            
            if (e.key === 'Escape') closeScreenshotViewer();
            if (e.key === 'ArrowLeft') prevScreenshot();
            if (e.key === 'ArrowRight') nextScreenshot();
        });

        // Close modals on outside click
        document.getElementById('gameModal').addEventListener('click', (e) => {
            if (e.target.id === 'gameModal') closeGameModal();
        });
    </script>
</body>
</html>
