<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nebula Admin - Zarządzanie Grami</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
        }
        
        .header {
            background: #12121a;
            padding: 20px 40px;
            border-bottom: 2px solid #00d4ff;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 15px;
        }
        
        .header h1 {
            color: #00d4ff;
            font-size: 28px;
        }

        .guild-info {
            color: #6a6a7a;
            font-size: 14px;
            margin-top: 5px;
        }

        .guild-selector {
            background: #16161f;
            border: 1px solid #2a2a3a;
            color: #fff;
            padding: 10px 15px;
            border-radius: 8px;
            font-size: 14px;
            cursor: pointer;
        }
        
        .btn {
            padding: 12px 24px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: bold;
            transition: all 0.3s;
        }
        
        .btn-primary {
            background: #00d4ff;
            color: #000;
        }
        
        .btn-primary:hover {
            background: #33ddff;
        }
        
        .btn-success {
            background: #00ff88;
            color: #000;
        }

        .btn-success:disabled {
            background: #2a3a2a;
            color: #666;
            cursor: not-allowed;
        }
        
        .btn-danger {
            background: #ff3366;
            color: #fff;
        }
        
        .btn-warning {
            background: #ffaa00;
            color: #000;
        }

        .btn-secondary {
            background: #2a2a3a;
            color: #fff;
            border: 1px solid #3a3a4a;
        }

        .btn-secondary:hover {
            background: #3a3a4a;
        }

        .btn-icon {
            padding: 8px 12px;
            font-size: 12px;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 30px;
        }

        .toolbar {
            display: flex;
            gap: 15px;
            margin-bottom: 30px;
            flex-wrap: wrap;
            align-items: center;
        }
        
        .search-box {
            flex: 1;
            min-width: 300px;
            padding: 12px 20px;
            background: #16161f;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        
        .games-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(400px, 1fr));
            gap: 20px;
        }
        
        .game-card {
            background: #16161f;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            overflow: hidden;
            transition: transform 0.2s, border-color 0.2s;
        }
        
        .game-card:hover {
            transform: translateY(-5px);
            border-color: #00d4ff;
        }
        
        .game-header {
            height: 120px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 60px;
            position: relative;
        }
        
        .game-pegi {
            position: absolute;
            top: 10px;
            right: 10px;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
        }

        .game-size {
            position: absolute;
            top: 10px;
            left: 10px;
            background: rgba(0,0,0,0.7);
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: bold;
            color: #00d4ff;
        }
        
        .game-body {
            padding: 20px;
        }
        
        .game-title {
            font-size: 20px;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .game-dev {
            color: #a0a0b0;
            font-size: 13px;
            margin-bottom: 10px;
        }
        
        .game-meta {
            display: flex;
            gap: 15px;
            margin-bottom: 10px;
            font-size: 13px;
            color: #6a6a7a;
        }
        
        .game-desc {
            font-size: 13px;
            color: #a0a0b0;
            line-height: 1.5;
            margin-bottom: 15px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }

        .screenshots-preview {
            display: flex;
            gap: 5px;
            margin-bottom: 15px;
            overflow-x: auto;
        }

        .screenshot-thumb {
            width: 80px;
            height: 45px;
            background: #0a0a0f;
            border-radius: 4px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            color: #2a2a3a;
        }

        .screenshot-thumb img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 4px;
        }

        .screenshot-count {
            background: #00d4ff;
            color: #000;
            font-size: 10px;
            padding: 2px 6px;
            border-radius: 10px;
            margin-left: 5px;
        }
        
        .game-requirements {
            background: #0a0a0f;
            border-radius: 8px;
            padding: 10px;
            margin-bottom: 15px;
            font-size: 12px;
        }

        .game-requirements summary {
            cursor: pointer;
            color: #00d4ff;
            font-weight: bold;
        }

        .req-section {
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px solid #2a2a3a;
        }

        .req-section h4 {
            color: #ffaa00;
            margin-bottom: 5px;
            font-size: 11px;
            text-transform: uppercase;
        }

        .req-item {
            display: flex;
            justify-content: space-between;
            margin: 3px 0;
            color: #a0a0b0;
        }
        
        .game-actions {
            display: flex;
            gap: 10px;
        }
        
        .game-actions .btn {
            flex: 1;
            padding: 10px;
            font-size: 13px;
        }
        
        .badge {
            display: inline-block;
            padding: 4px 10px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: bold;
            margin-right: 5px;
        }
        
        .badge-free {
            background: #00ff88;
            color: #000;
        }
        
        .badge-paid {
            background: #ffaa00;
            color: #000;
        }
        
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 1000;
            justify-content: center;
            align-items: center;
            overflow-y: auto;
        }
        
        .modal {
            background: #16161f;
            border: 1px solid #2a2a3a;
            border-radius: 16px;
            width: 90%;
            max-width: 800px;
            max-height: 90vh;
            overflow-y: auto;
            margin: 20px 0;
        }
        
        .modal-header {
            padding: 25px;
            border-bottom: 1px solid #2a2a3a;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            background: #16161f;
            z-index: 10;
        }
        
        .modal-header h2 {
            color: #00d4ff;
        }
        
        .modal-close {
            background: none;
            border: none;
            color: #fff;
            font-size: 28px;
            cursor: pointer;
        }
        
        .modal-body {
            padding: 25px;
        }

        .section-title {
            color: #00d4ff;
            font-size: 14px;
            margin: 20px 0 10px 0;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-bottom: 1px solid #2a2a3a;
            padding-bottom: 5px;
        }
        
        .form-group {
            margin-bottom: 15px;
        }
        
        .form-group label {
            display: block;
            margin-bottom: 8px;
            color: #a0a0b0;
            font-size: 13px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        
        .form-group input,
        .form-group select,
        .form-group textarea {
            width: 100%;
            padding: 12px 15px;
            background: #0a0a0f;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            color: #fff;
            font-size: 14px;
        }
        
        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            outline: none;
            border-color: #00d4ff;
        }
        
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .form-row-3 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr;
            gap: 15px;
        }

        .form-row-4 {
            display: grid;
            grid-template-columns: 1fr 1fr 1fr 1fr;
            gap: 15px;
        }
        
        .empty-state {
            text-align: center;
            padding: 60px;
            color: #6a6a7a;
        }
        
        .empty-state h3 {
            font-size: 24px;
            margin-bottom: 10px;
        }
        
        .toast {
            position: fixed;
            bottom: 30px;
            right: 30px;
            padding: 15px 25px;
            border-radius: 8px;
            color: #fff;
            font-weight: bold;
            transform: translateX(400px);
            transition: transform 0.3s;
            z-index: 2000;
        }
        
        .toast.show {
            transform: translateX(0);
        }
        
        .toast.success {
            background: #00ff88;
            color: #000;
        }
        
        .toast.error {
            background: #ff3366;
        }

        .toast.info {
            background: #00d4ff;
            color: #000;
        }
        
        .loading {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid rgba(255,255,255,.3);
            border-radius: 50%;
            border-top-color: #00d4ff;
            animation: spin 1s ease-in-out infinite;
        }
        
        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .screenshots-section {
            background: #0a0a0f;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 15px;
        }

        .screenshots-list {
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            margin-top: 10px;
        }

        .screenshot-item {
            position: relative;
            width: 120px;
            height: 67px;
            background: #16161f;
            border-radius: 8px;
            overflow: hidden;
            border: 1px solid #2a2a3a;
        }

        .screenshot-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .screenshot-item .remove-btn {
            position: absolute;
            top: 2px;
            right: 2px;
            background: #ff3366;
            color: #fff;
            border: none;
            border-radius: 4px;
            padding: 2px 6px;
            font-size: 10px;
            cursor: pointer;
            opacity: 0;
            transition: opacity 0.2s;
        }

        .screenshot-item:hover .remove-btn {
            opacity: 1;
        }

        .add-screenshot-btn {
            width: 120px;
            height: 67px;
            background: #16161f;
            border: 2px dashed #2a2a3a;
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            color: #6a6a7a;
            font-size: 24px;
            transition: all 0.2s;
        }

        .add-screenshot-btn:hover {
            border-color: #00d4ff;
            color: #00d4ff;
        }

        .screenshot-input {
            display: none;
        }

        .compat-check {
            background: #1a1a2e;
            border: 1px solid #2a2a3a;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
        }

        .compat-check h3 {
            color: #00d4ff;
            margin-bottom: 10px;
            font-size: 14px;
        }

        .compat-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #2a2a3a;
        }

        .compat-item:last-child {
            border-bottom: none;
        }

        .compat-status {
            font-size: 12px;
            padding: 4px 8px;
            border-radius: 4px;
        }

        .compat-ok {
            background: #00ff8830;
            color: #00ff88;
        }

        .compat-fail {
            background: #ff336630;
            color: #ff3366;
        }

        .compat-unknown {
            background: #ffaa0030;
            color: #ffaa00;
        }
    </style>
</head>
<body>
    <div class="header">
        <div>
            <h1>🌌 NEBULA ADMIN</h1>
            <div class="guild-info" id="guildInfo">Ładowanie...</div>
        </div>
        <div style="display: flex; gap: 10px; align-items: center;">
            <select class="guild-selector" id="guildSelector" onchange="changeGuild()">
                <option value="">Wybierz serwer...</option>
            </select>
            <button class="btn btn-secondary" onclick="checkCompatibility()">🖥️ Sprawdź PC</button>
            <button class="btn btn-primary" onclick="openModal()">➕ Dodaj Grę</button>
        </div>
    </div>
    
    <div class="container">
        <div class="toolbar">
            <input type="text" class="search-box" id="searchInput" placeholder="🔍 Szukaj gry..." onkeyup="filterGames()">
            <button class="btn btn-secondary" onclick="refreshData()">🔄 Odśwież</button>
        </div>

        <!-- Panel kompatybilności -->
        <div class="compat-check" id="compatPanel" style="display: none;">
            <h3>🖥️ Twoja Konfiguracja</h3>
            <div id="compatList"></div>
        </div>
        
        <div class="games-grid" id="gamesGrid">
            <div class="empty-state" style="grid-column: 1/-1;">
                <div class="loading"></div>
                <p>Ładowanie gier...</p>
            </div>
        </div>
    </div>
    
    <!-- Modal -->
    <div class="modal-overlay" id="modal">
        <div class="modal">
            <div class="modal-header">
                <h2 id="modalTitle">Dodaj Nową Grę</h2>
                <button class="modal-close" onclick="closeModal()">&times;</button>
            </div>
            <div class="modal-body">
                <form id="gameForm" onsubmit="saveGame(event)">
                    <input type="hidden" id="gameId">
                    
                    <div class="section-title">Podstawowe Informacje</div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Nazwa gry *</label>
                            <input type="text" id="inputName" placeholder="Minecraft Launcher" required>
                        </div>
                        <div class="form-group">
                            <label>Developer</label>
                            <input type="text" id="inputDev" placeholder="Mojang">
                        </div>
                    </div>
                    
                    <div class="form-row-4">
                        <div class="form-group">
                            <label>Cena (zł)</label>
                            <input type="number" id="inputPrice" step="0.01" value="0" min="0">
                        </div>
                        <div class="form-group">
                            <label>PEGI</label>
                            <select id="inputPegi">
                                <option value="3">3</option>
                                <option value="7">7</option>
                                <option value="12" selected>12</option>
                                <option value="16">16</option>
                                <option value="18">18</option>
                            </select>
                        </div>
                        <div class="form-group">
                            <label>Rozmiar (GB)</label>
                            <input type="number" id="inputSize" step="0.1" min="0" placeholder="np. 15.5">
                        </div>
                        <div class="form-group">
                            <label>Wersja</label>
                            <input type="text" id="inputVersion" placeholder="1.0">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Gatunek</label>
                            <input type="text" id="inputGenre" placeholder="Akcja, RPG, Strategia...">
                        </div>
                        <div class="form-group">
                            <label>Data premiery</label>
                            <input type="date" id="inputReleaseDate">
                        </div>
                    </div>

                    <div class="form-row">
                        <div class="form-group">
                            <label>Wydawca</label>
                            <input type="text" id="inputPublisher" placeholder="Nazwa wydawcy">
                        </div>
                        <div class="form-group">
                            <label>Język</label>
                            <input type="text" id="inputLanguage" placeholder="Polski, Angielski...">
                        </div>
                    </div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>Ikona (emoji)</label>
                            <input type="text" id="inputIcon" placeholder="🎮" maxlength="2">
                        </div>
                        <div class="form-group">
                            <label>Kolor (hex)</label>
                            <input type="color" id="inputColor" value="#00d4ff">
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label>URL Pobierania</label>
                        <input type="url" id="inputUrl" placeholder="https://...">
                    </div>
                    
                    <div class="form-group">
                        <label>Opis</label>
                        <textarea id="inputDesc" rows="3" placeholder="Krótki opis gry..."></textarea>
                    </div>

                    <!-- Screenshoty -->
                    <div class="section-title">📸 Screenshoty</div>
                    <div class="screenshots-section">
                        <div class="form-group">
                            <label>URL Screenshota</label>
                            <div style="display: flex; gap: 10px;">
                                <input type="url" id="screenshotUrl" placeholder="https://..." style="flex: 1;">
                                <button type="button" class="btn btn-secondary" onclick="addScreenshot()">Dodaj</button>
                            </div>
                        </div>
                        <div class="screenshots-list" id="screenshotsList">
                            <!-- Tutaj będą screenshoty -->
                        </div>
                    </div>

                    <div class="section-title">Wymagania Minimalne</div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>System OS</label>
                            <input type="text" id="reqMinOs" placeholder="Windows 10 64-bit">
                        </div>
                        <div class="form-group">
                            <label>Procesor</label>
                            <input type="text" id="reqMinCpu" placeholder="Intel i3-4170">
                        </div>
                    </div>
                    
                    <div class="form-row-4">
                        <div class="form-group">
                            <label>RAM</label>
                            <input type="text" id="reqMinRam" placeholder="8 GB">
                        </div>
                        <div class="form-group">
                            <label>Karta graficzna</label>
                            <input type="text" id="reqMinGpu" placeholder="GTX 1050">
                        </div>
                        <div class="form-group" style="grid-column: span 2;">
                            <label>Dysk</label>
                            <input type="text" id="reqMinStorage" placeholder="20 GB">
                        </div>
                    </div>

                    <div class="section-title">Wymagania Rekomendowane</div>
                    
                    <div class="form-row">
                        <div class="form-group">
                            <label>System OS</label>
                            <input type="text" id="reqRecOs" placeholder="Windows 11 64-bit">
                        </div>
                        <div class="form-group">
                            <label>Procesor</label>
                            <input type="text" id="reqRecCpu" placeholder="Intel i5-10400">
                        </div>
                    </div>
                    
                    <div class="form-row-4">
                        <div class="form-group">
                            <label>RAM</label>
                            <input type="text" id="reqRecRam" placeholder="16 GB">
                        </div>
                        <div class="form-group">
                            <label>Karta graficzna</label>
                            <input type="text" id="reqRecGpu" placeholder="RTX 3060">
                        </div>
                        <div class="form-group" style="grid-column: span 2;">
                            <label>Dysk</label>
                            <input type="text" id="reqRecStorage" placeholder="20 GB SSD">
                        </div>
                    </div>
                    
                    <button type="submit" class="btn btn-success" style="width: 100%; padding: 15px; margin-top: 20px;">
                        💾 Zapisz Grę
                    </button>
                </form>
            </div>
        </div>
    </div>
    
    <div class="toast" id="toast"></div>

    <script>
        const API_URL = window.location.origin;
        
        let games = [];
        let editingId = null;
        let userPC = null;
        let currentGuildId = '';
        let currentScreenshots = [];

        // Inicjalizacja
        init();

        async function init() {
            await loadGuilds();
            await loadGames();
        }

        async function loadGuilds() {
            try {
                const response = await fetch(`${API_URL}/health`);
                const data = await response.json();
                
                const selector = document.getElementById('guildSelector');
                selector.innerHTML = '<option value="">Wybierz serwer...</option>';
                
                if (data.guildsReady && data.guildsReady.length > 0) {
                    data.guildsReady.forEach(guild => {
                        const option = document.createElement('option');
                        option.value = guild.id;
                        option.textContent = `${guild.name} (${guild.memberCount} osób)`;
                        selector.appendChild(option);
                    });
                    
                    // Wybierz pierwszy domyślnie
                    if (data.guildsReady.length > 0) {
                        currentGuildId = data.guildsReady[0].id;
                        selector.value = currentGuildId;
                    }
                }
            } catch (error) {
                console.error('Błąd ładowania guildów:', error);
            }
        }

        function changeGuild() {
            const selector = document.getElementById('guildSelector');
            currentGuildId = selector.value;
            loadGames();
        }

        async function loadGames() {
            if (!currentGuildId) {
                document.getElementById('gamesGrid').innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <h3>📂 Wybierz serwer</h3>
                        <p>Wybierz serwer Discord z listy powyżej, aby zarządzać grami</p>
                    </div>
                `;
                return;
            }

            try {
                document.getElementById('guildInfo').innerHTML = `<span class="loading"></span> Ładowanie...`;
                
                const response = await fetch(`${API_URL}/games?guildId=${currentGuildId}`, {
                    method: 'GET',
                    headers: { 'Accept': 'application/json' }
                });
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                const data = await response.json();
                games = Array.isArray(data) ? data : [];
                
                const guildName = document.getElementById('guildSelector').selectedOptions[0]?.text.split('(')[0] || 'Unknown';
                document.getElementById('guildInfo').innerHTML = `${guildName.trim()} • ${games.length} gier`;
                renderGames();
                
            } catch (error) {
                console.error('Błąd ładowania:', error);
                showToast('Błąd ładowania gier: ' + error.message, 'error');
                document.getElementById('gamesGrid').innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <h3>⚠️ Błąd połączenia</h3>
                        <p>${error.message}</p>
                        <button class="btn btn-primary" onclick="loadGames()" style="margin-top: 20px;">
                            🔄 Spróbuj ponownie
                        </button>
                    </div>
                `;
            }
        }

        function refreshData() {
            showToast('Odświeżanie...', 'info');
            loadGames();
        }

        function checkCompatibility() {
            const saved = localStorage.getItem('userPCConfig');
            if (saved) {
                userPC = JSON.parse(saved);
                showCompatPanel();
                renderGames();
                return;
            }

            const os = prompt('Twój system operacyjny:', 'Windows 10');
            if (!os) return;
            
            const ram = prompt('Ilość RAM (GB):', '16');
            if (!ram) return;
            
            const cpu = prompt('Procesor:', 'Intel i5');
            if (!cpu) return;
            
            const gpu = prompt('Karta graficzna:', 'GTX 1060');
            if (!gpu) return;

            userPC = {
                os: os.toLowerCase(),
                ram: parseInt(ram) || 0,
                cpu: cpu.toLowerCase(),
                gpu: gpu.toLowerCase(),
                raw: { os, ram: ram + ' GB', cpu, gpu }
            };

            localStorage.setItem('userPCConfig', JSON.stringify(userPC));
            showCompatPanel();
            renderGames();
        }

        function showCompatPanel() {
            if (!userPC) return;
            
            document.getElementById('compatPanel').style.display = 'block';
            document.getElementById('compatList').innerHTML = `
                <div class="compat-item">
                    <span>🖥️ System</span>
                    <span class="compat-status compat-ok">${userPC.raw.os}</span>
                </div>
                <div class="compat-item">
                    <span>🧠 RAM</span>
                    <span class="compat-status compat-ok">${userPC.raw.ram}</span>
                </div>
                <div class="compat-item">
                    <span>⚡ Procesor</span>
                    <span class="compat-status compat-ok">${userPC.raw.cpu}</span>
                </div>
                <div class="compat-item">
                    <span>🎮 GPU</span>
                    <span class="compat-status compat-ok">${userPC.raw.gpu}</span>
                </div>
            `;
        }

        function checkGameCompatibility(game) {
            if (!userPC || !game.requirements || !game.requirements.min) {
                return { compatible: true, reason: 'Brak danych' };
            }

            const min = game.requirements.min;
            const ramMatch = min.ram ? parseInt(min.ram) <= userPC.ram : true;
            const osMatch = min.os ? 
                userPC.os.includes(min.os.toLowerCase().split(' ')[0]) || 
                min.os.toLowerCase().includes(userPC.os.split(' ')[0]) : true;

            if (!ramMatch) return { compatible: false, reason: `Za mało RAM (wymagane: ${min.ram})` };
            if (!osMatch) return { compatible: false, reason: `Niekompatybilny system (wymagany: ${min.os})` };
            
            return { compatible: true, reason: 'OK' };
        }

        // Screenshoty
        function addScreenshot() {
            const url = document.getElementById('screenshotUrl').value.trim();
            if (!url) {
                showToast('Wprowadź URL screenshota', 'error');
                return;
            }

            if (!url.match(/^https?:\/\/.+/i)) {
                showToast('Nieprawidłowy URL', 'error');
                return;
            }

            if (currentScreenshots.includes(url)) {
                showToast('Ten screenshot już istnieje', 'error');
                return;
            }

            currentScreenshots.push(url);
            document.getElementById('screenshotUrl').value = '';
            renderScreenshots();
        }

        function removeScreenshot(index) {
            currentScreenshots.splice(index, 1);
            renderScreenshots();
        }

        function renderScreenshots() {
            const container = document.getElementById('screenshotsList');
            container.innerHTML = '';

            currentScreenshots.forEach((url, index) => {
                const item = document.createElement('div');
                item.className = 'screenshot-item';
                item.innerHTML = `
                    <img src="${url}" alt="Screenshot" onerror="this.src='data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%22100%22 height=%2267%22><text x=%2250%22 y=%2250%22 text-anchor=%22middle%22 fill=%22%23666%22>❌</text></svg>'">
                    <button type="button" class="remove-btn" onclick="removeScreenshot(${index})">×</button>
                `;
                container.appendChild(item);
            });

            // Przycisk dodawania
            const addBtn = document.createElement('div');
            addBtn.className = 'add-screenshot-btn';
            addBtn.innerHTML = '+';
            addBtn.onclick = () => document.getElementById('screenshotUrl').focus();
            container.appendChild(addBtn);
        }

        async function saveGameToServer(gameData) {
            try {
                const url = editingId 
                    ? `${API_URL}/api/games/${editingId}?guildId=${currentGuildId}` 
                    : `${API_URL}/api/games?guildId=${currentGuildId}`;
                
                const method = editingId ? 'PUT' : 'POST';
                
                console.log('Zapisywanie:', method, url, gameData);
                
                const response = await fetch(url, {
                    method: method,
                    headers: {
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(gameData)
                });
                
                if (!response.ok) {
                    const errorText = await response.text();
                    throw new Error(`HTTP ${response.status}: ${errorText}`);
                }
                
                const result = await response.json();
                console.log('Zapisano:', result);
                
                showToast(editingId ? 'Zaktualizowano grę!' : 'Dodano nową grę!', 'success');
                await loadGames();
                return true;
                
            } catch (error) {
                console.error('Błąd zapisywania:', error);
                showToast('Błąd: ' + error.message, 'error');
                return false;
            }
        }

        async function deleteGameFromServer(id) {
            try {
                const response = await fetch(`${API_URL}/api/games/${id}?guildId=${currentGuildId}`, {
                    method: 'DELETE',
                    headers: { 'Accept': 'application/json' }
                });
                
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                
                showToast('Usunięto grę!', 'success');
                await loadGames();
                
            } catch (error) {
                console.error('Błąd usuwania:', error);
                showToast('Błąd usuwania: ' + error.message, 'error');
            }
        }

        function renderGames() {
            const grid = document.getElementById('gamesGrid');
            const search = document.getElementById('searchInput').value.toLowerCase();
            
            grid.innerHTML = '';
            
            const filtered = games.filter(game => {
                const name = (game.name || '').toLowerCase();
                const dev = (game.developer || '').toLowerCase();
                const genre = (game.genre || '').toLowerCase();
                return name.includes(search) || dev.includes(search) || genre.includes(search);
            });
            
            if (filtered.length === 0) {
                grid.innerHTML = `
                    <div class="empty-state" style="grid-column: 1/-1;">
                        <h3>📂 Brak gier</h3>
                        <p>${search ? 'Nie znaleziono pasujących gier' : 'Dodaj pierwszą grę używając przycisku powyżej'}</p>
                    </div>
                `;
                return;
            }
            
            filtered.forEach(game => {
                const isFree = game.price === 0;
                const size = game.size ? `${game.size} GB` : 'N/A';
                const compat = checkGameCompatibility(game);
                const screenshots = game.screenshots || [];
                
                let reqHtml = '';
                if (game.requirements && (game.requirements.min || game.requirements.rec)) {
                    const min = game.requirements.min || {};
                    const rec = game.requirements.rec || {};
                    
                    reqHtml = `
                        <details class="game-requirements">
                            <summary>🖥️ Wymagania systemowe</summary>
                            ${min.os ? `
                            <div class="req-section">
                                <h4>Minimalne</h4>
                                ${min.os ? `<div class="req-item"><span>OS:</span><span>${min.os}</span></div>` : ''}
                                ${min.cpu ? `<div class="req-item"><span>CPU:</span><span>${min.cpu}</span></div>` : ''}
                                ${min.ram ? `<div class="req-item"><span>RAM:</span><span>${min.ram}</span></div>` : ''}
                                ${min.gpu ? `<div class="req-item"><span>GPU:</span><span>${min.gpu}</span></div>` : ''}
                                ${min.storage ? `<div class="req-item"><span>Dysk:</span><span>${min.storage}</span></div>` : ''}
                            </div>` : ''}
                            ${rec.os ? `
                            <div class="req-section">
                                <h4>Rekomendowane</h4>
                                ${rec.os ? `<div class="req-item"><span>OS:</span><span>${rec.os}</span></div>` : ''}
                                ${rec.cpu ? `<div class="req-item"><span>CPU:</span><span>${rec.cpu}</span></div>` : ''}
                                ${rec.ram ? `<div class="req-item"><span>RAM:</span><span>${rec.ram}</span></div>` : ''}
                                ${rec.gpu ? `<div class="req-item"><span>GPU:</span><span>${rec.gpu}</span></div>` : ''}
                                ${rec.storage ? `<div class="req-item"><span>Dysk:</span><span>${rec.storage}</span></div>` : ''}
                            </div>` : ''}
                        </details>
                    `;
                }

                // Preview screenshotów
                let screenshotsHtml = '';
                if (screenshots.length > 0) {
                    screenshotsHtml = `
                        <div class="screenshots-preview">
                            ${screenshots.slice(0, 3).map(url => `
                                <div class="screenshot-thumb">
                                    <img src="${url}" alt="" onerror="this.style.display='none'">
                                </div>
                            `).join('')}
                            ${screenshots.length > 3 ? `<div class="screenshot-thumb" style="background: #00d4ff; color: #000; font-size: 12px; font-weight: bold;">+${screenshots.length - 3}</div>` : ''}
                        </div>
                    `;
                }

                let compatBadge = '';
                if (userPC) {
                    if (compat.compatible) {
                        compatBadge = '<span class="badge" style="background: #00ff88; color: #000;">✓ Działa</span>';
                    } else {
                        compatBadge = `<span class="badge" style="background: #ff3366; color: #fff;" title="${compat.reason}">✖ ${compat.reason}</span>`;
                    }
                }
                
                const card = document.createElement('div');
                card.className = 'game-card';
                card.innerHTML = `
                    <div class="game-header" style="background: ${game.color || '#00d4ff'}20;">
                        <span>${game.icon || '🎮'}</span>
                        <span class="game-pegi">PEGI ${game.pegi || 12}</span>
                        <span class="game-size">💾 ${size}</span>
                    </div>
                    <div class="game-body">
                        <div class="game-title">${game.name} ${compatBadge}</div>
                        <div class="game-dev">${game.developer || 'Unknown'} ${game.genre ? `• ${game.genre}` : ''}</div>
                        <div style="margin-bottom: 10px;">
                            ${isFree ? '<span class="badge badge-free">DARMOWE</span>' : `<span class="badge badge-paid">${game.price} zł</span>`}
                            ${screenshots.length > 0 ? `<span class="screenshot-count">📸 ${screenshots.length}</span>` : ''}
                        </div>
                        <div class="game-desc">${game.description || 'Brak opisu'}</div>
                        ${screenshotsHtml}
                        ${reqHtml}
                        <div class="game-actions">
                            <button class="btn btn-primary btn-icon" onclick="editGame('${game.id}')">✏️ Edytuj</button>
                            ${compat.compatible ? 
                                `<button class="btn btn-success btn-icon" onclick="downloadGame('${game.id}')">⬇️ Pobierz</button>` :
                                `<button class="btn btn-success btn-icon" disabled title="${compat.reason}">⛔ Brak wsparcia</button>`
                            }
                            <button class="btn btn-danger btn-icon" onclick="deleteGame('${game.id}')">🗑️</button>
                        </div>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        function downloadGame(gameId) {
            const game = games.find(g => g.id === gameId);
            if (!game || !game.download_url) {
                showToast('Brak linku do pobrania!', 'error');
                return;
            }
            window.open(game.download_url, '_blank');
        }

        function filterGames() {
            renderGames();
        }

        function openModal(id = null) {
            if (!currentGuildId) {
                showToast('Najpier wybierz serwer!', 'error');
                return;
            }

            editingId = id;
            currentScreenshots = [];
            document.getElementById('modal').style.display = 'flex';
            document.getElementById('modalTitle').textContent = id ? 'Edytuj Grę' : 'Dodaj Nową Grę';
            
            if (id) {
                const game = games.find(g => g.id === id);
                if (game) {
                    document.getElementById('inputName').value = game.name || '';
                    document.getElementById('inputDev').value = game.developer || '';
                    document.getElementById('inputPrice').value = game.price || 0;
                    document.getElementById('inputPegi').value = game.pegi || 12;
                    document.getElementById('inputIcon').value = game.icon || '';
                    document.getElementById('inputColor').value = game.color || '#00d4ff';
                    document.getElementById('inputUrl').value = game.download_url || '';
                    document.getElementById('inputDesc').value = game.description || '';
                    document.getElementById('inputSize').value = game.size || '';
                    document.getElementById('inputVersion').value = game.version || '';
                    document.getElementById('inputGenre').value = game.genre || '';
                    document.getElementById('inputReleaseDate').value = game.releaseDate || '';
                    document.getElementById('inputPublisher').value = game.publisher || '';
                    document.getElementById('inputLanguage').value = game.language || '';
                    
                    // Screenshoty
                    if (game.screenshots) {
                        currentScreenshots = [...game.screenshots];
                    }
                    renderScreenshots();
                    
                    // Wymagania
                    if (game.requirements) {
                        const min = game.requirements.min || {};
                        const rec = game.requirements.rec || {};
                        
                        document.getElementById('reqMinOs').value = min.os || '';
                        document.getElementById('reqMinCpu').value = min.cpu || '';
                        document.getElementById('reqMinRam').value = min.ram || '';
                        document.getElementById('reqMinGpu').value = min.gpu || '';
                        document.getElementById('reqMinStorage').value = min.storage || '';
                        
                        document.getElementById('reqRecOs').value = rec.os || '';
                        document.getElementById('reqRecCpu').value = rec.cpu || '';
                        document.getElementById('reqRecRam').value = rec.ram || '';
                        document.getElementById('reqRecGpu').value = rec.gpu || '';
                        document.getElementById('reqRecStorage').value = rec.storage || '';
                    }
                }
            } else {
                document.getElementById('gameForm').reset();
                document.getElementById('inputColor').value = '#00d4ff';
                renderScreenshots();
            }
        }

        function closeModal() {
            document.getElementById('modal').style.display = 'none';
            editingId = null;
            currentScreenshots = [];
        }

        async function saveGame(e) {
            e.preventDefault();
            
            const gameData = {
                name: document.getElementById('inputName').value,
                developer: document.getElementById('inputDev').value,
                price: parseFloat(document.getElementById('inputPrice').value) || 0,
                pegi: parseInt(document.getElementById('inputPegi').value) || 12,
                icon: document.getElementById('inputIcon').value || '🎮',
                color: document.getElementById('inputColor').value,
                download_url: document.getElementById('inputUrl').value || null,
                description: document.getElementById('inputDesc').value,
                size: parseFloat(document.getElementById('inputSize').value) || null,
                version: document.getElementById('inputVersion').value || '1.0',
                genre: document.getElementById('inputGenre').value || 'Nieznany',
                releaseDate: document.getElementById('inputReleaseDate').value || new Date().toISOString().split('T')[0],
                publisher: document.getElementById('inputPublisher').value || '',
                language: document.getElementById('inputLanguage').value || 'Polski/Angielski',
                screenshots: currentScreenshots,
                requirements: {
                    min: {
                        os: document.getElementById('reqMinOs').value,
                        cpu: document.getElementById('reqMinCpu').value,
                        ram: document.getElementById('reqMinRam').value,
                        gpu: document.getElementById('reqMinGpu').value,
                        storage: document.getElementById('reqMinStorage').value
                    },
                    rec: {
                        os: document.getElementById('reqRecOs').value,
                        cpu: document.getElementById('reqRecCpu').value,
                        ram: document.getElementById('reqRecRam').value,
                        gpu: document.getElementById('reqRecGpu').value,
                        storage: document.getElementById('reqRecStorage').value
                    }
                }
            };
            
            const success = await saveGameToServer(gameData);
            if (success) {
                closeModal();
            }
        }

        function editGame(id) {
            openModal(id);
        }

        async function deleteGame(id) {
            const game = games.find(g => g.id === id);
            if (!confirm(`Czy na pewno chcesz usunąć "${game?.name || id}"?`)) return;
            await deleteGameFromServer(id);
        }

        function showToast(message, type = 'success') {
            const toast = document.getElementById('toast');
            toast.textContent = message;
            toast.className = `toast ${type} show`;
            
            setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        // Zamknij modal po kliknięciu poza nim
        document.getElementById('modal').addEventListener('click', (e) => {
            if (e.target.id === 'modal') closeModal();
        });

        // Załaduj zapisany config przy starcie
        const savedConfig = localStorage.getItem('userPCConfig');
        if (savedConfig) {
            userPC = JSON.parse(savedConfig);
            showCompatPanel();
        }

        // Enter w polu screenshotu
        document.getElementById('screenshotUrl').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                addScreenshot();
            }
        });
    </script>
</body>
</html>
